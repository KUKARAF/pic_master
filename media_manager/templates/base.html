<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}media{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="/">MEDIA<span class="logo-dim">//</span>MGR</a>
  <a class="nav-link" href="/faces">Faces</a>
  <a class="nav-link" href="/tags">Tags</a>
  <a class="nav-link" href="/categories">Categories</a>
  <a class="nav-link" href="/sets">Sets</a>
  <a class="nav-link" href="/studios">Studios</a>
  <a class="nav-link" href="/duplicates">Duplicates</a>

  <form class="nav-search" action="/search" method="get">
    <input type="text" id="nav-search-input" name="q" placeholder="search photos, tags, people… ( / )" value="{{ request.query_params.get('q', '') }}">
    <button type="submit">Search</button>
  </form>

  <div style="position:relative;">
    <button class="nav-tags-btn" id="warn-dropdown-btn" type="button">
      ⚠️<span id="warn-badge" class="warn-badge" style="display:none;">0</span>
    </button>
    <div class="tags-dropdown" id="warn-dropdown-menu">
      <div id="warn-list"></div>
      <button type="button" id="warn-mark-all-btn" style="width:100%;margin-top:6px;display:none;">Mark all read</button>
    </div>
  </div>
</nav>

<div class="container {% block container_class %}{% endblock %}">
  {% block content %}{% endblock %}
</div>

<div class="modal-overlay" id="modal-overlay" style="display:none;">
  <div class="modal-box" id="modal-box"></div>
</div>

<div class="palette-overlay" id="palette-overlay" style="display:none;">
  <div class="palette-box" id="palette-box">
    <div class="palette-input-row">
      <span class="palette-caret">&gt;</span>
      <div class="palette-chips" id="palette-chips"></div>
      <input type="text" id="palette-input" class="palette-in" autocomplete="off"
             placeholder="type anything — a tag, category, person, set, filename…">
      <span class="palette-count" id="palette-count"></span>
    </div>
    <div class="palette-body">
      <div class="palette-suggestions" id="palette-suggestions"></div>
      <div class="palette-grid" id="palette-grid"></div>
    </div>
    <div class="palette-footer">
      <a href="#" id="palette-viewall" class="sub" style="display:none;">View all results →</a>
      <span class="sub palette-hint">↑↓ select · Enter add chip · Backspace remove chip · Esc close</span>
    </div>
  </div>
</div>

<script>
/* Watch queue: clicking into a photo from any grid (gallery, set/category
   detail, search, similar/body-similar) records that grid's file ids +
   the clicked position in sessionStorage, so the photo viewer's Left/Right
   keys browse that exact collection instead of global photo order. */
document.addEventListener('click', function (e) {
  var link = e.target.closest('.card-img-link, .card-name');
  if (!link) return;
  var cardEl = link.closest('.card[data-file-id]');
  if (!cardEl) return;
  var container = cardEl.closest('[data-queue-source]') || cardEl.parentElement;
  if (!container) return;
  var cards = Array.prototype.slice.call(container.querySelectorAll('.card[data-file-id]'));
  var ids = cards.map(function (c) { return parseInt(c.dataset.fileId, 10); });
  var cursor = ids.indexOf(parseInt(cardEl.dataset.fileId, 10));
  sessionStorage.setItem('photoQueue', JSON.stringify({
    ids: ids,
    cursor: cursor,
    label: container.dataset.queueSource || document.title,
  }));
});
</script>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
